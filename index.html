<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan Project </title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            height:100vh;
            width:100vw;
            display:grid;
            place-content:center;
            background:#0f2027; 
        }
        div {
            width:350px;
            height:400px;
            display:flex;
            justify-content:center;
            align-items:center;
            background:white;
            border-radius:20px;
        }
        .blades{
            width:390px;
            position:absolute;
            animation:rotate 0.2s linear infinite;
            margin-bottom :120px;
        }
        .fan {
            width:300px;
            position:absolute;
        }
        @keyframes rotate{

            0%{
                transform:rotate(0deg);
            }

            100%{
                transform:rotate(360deg);
            }

        }

    </style>
</head>
<body>
    <div>
        <img src="blade.png" class="blades">
        <!-- fan body image -->
        <img src="fan.png" class="fan">
    </div>
</body>
</html>
