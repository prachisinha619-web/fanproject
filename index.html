<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fan</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            background:pink;
            height:100vh;
            display:grid;
            place-content:center;
        }
        div{
            background-color:white;
            padding:50px;
            width:350px;
            text-align:center;
            border-radius:20px;
        }
        img{
            width:250px;
            margin-bottom:30px;
        }
        @keyframes rotate{
            0%{transform:rotate(0deg);}
            100%{transform:rotate(360deg);}
        }
        .active{
            animation:rotate 0.4s linear infinite;
        }
    </style>
  </head>
    <body>
        <div>
           <img id="fan"src="fan.jpeg" alt"image not found" >
        </div>
        
        <script>
           let fan = document .getElementById('fan');
            fan.classList.add('active');
        </script>
     </body>
     </html>
